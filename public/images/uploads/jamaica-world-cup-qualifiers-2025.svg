<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Jamaica qualifies for FIBA World Cup Americas Qualifiers</title>
  <desc id="desc">Celebratory graphic for Jamaica reaching the FIBA World Cup Americas Qualifiers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08140e"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f3c93f"/>
      <stop offset="100%" stop-color="#ffeaa0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1280" cy="160" r="240" fill="#0c8f3f" opacity="0.14"/>
  <circle cx="240" cy="180" r="170" fill="#f6c445" opacity="0.12"/>
  <rect x="84" y="84" width="1432" height="732" rx="36" fill="#0e1210" stroke="#2e3a31" stroke-width="4"/>

  <text x="130" y="178" fill="#f7f5ee" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" letter-spacing="5">NATIONAL TEAM</text>
  <text x="130" y="276" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="88" font-weight="800">JAMAICA MAKES HISTORY</text>
  <text x="130" y="350" fill="#f3c93f" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" letter-spacing="3">FIBA WORLD CUP AMERICAS QUALIFIERS</text>

  <g transform="translate(130 430)">
    <rect width="620" height="240" rx="28" fill="#111915" stroke="#335040" stroke-width="3"/>
    <text x="48" y="70" fill="#89c265" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" letter-spacing="3">PATH TO QUALIFICATION</text>
    <text x="48" y="132" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="800">101-79 vs Barbados</text>
    <text x="48" y="184" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="800">80-76 (OT) vs Costa Rica</text>
    <text x="48" y="218" fill="#b9c0c9" font-family="Arial, Helvetica, sans-serif" font-size="26">Historic advancement to the full qualifiers</text>
  </g>

  <g transform="translate(840 400)">
    <circle cx="270" cy="150" r="150" fill="#111915" stroke="url(#shine)" stroke-width="12"/>
    <rect x="168" y="86" width="204" height="126" rx="14" fill="#009b3a"/>
    <polygon points="168,149 270,86 372,149 270,212" fill="#fcd116"/>
    <polygon points="168,86 241,130 241,168 168,212" fill="#000000"/>
    <polygon points="372,86 299,130 299,168 372,212" fill="#000000"/>
    <text x="270" y="286" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" letter-spacing="3">AUGUST 2025</text>
  </g>

  <text x="130" y="760" fill="#d7d9de" font-family="Arial, Helvetica, sans-serif" font-size="30">Powered by breakthrough performances and Jamaica's first-ever step into the Americas qualifying round</text>
</svg>
